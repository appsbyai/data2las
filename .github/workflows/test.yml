name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[gui]"
      - name: Test imports
        run: |
          python -c "from rock2las.engine import Pipeline; print('OK')"
          python -c "from rock2las.utils import read_file_header; print('OK')"
          python -c "from rock2las.gnss import parse_nav_pvt; print('OK')"
