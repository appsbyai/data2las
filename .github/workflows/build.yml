name: Build All Platforms

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[gui]" && pip install pyinstaller
      - run: pyinstaller --onefile --windowed --name Data2Las src/data2las/gui/app.py
      - run: ren dist\Data2Las.exe Data2Las-Windows.exe
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/Data2Las-Windows.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libopengl0
      - run: pip install -e ".[gui]" && pip install pyinstaller
      - run: pyinstaller --onefile --windowed --name Data2Las src/data2las/gui/app.py
      - run: mv dist/Data2Las dist/Data2Las-Linux
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/Data2Las-Linux

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[gui]" && pip install pyinstaller
      - run: pyinstaller --onefile --windowed --name Data2Las src/data2las/gui/app.py
      - run: mv dist/Data2Las dist/Data2Las-macOS
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/Data2Las-macOS
